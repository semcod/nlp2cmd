    - "pokaż stronę wikipedia.org"
  en:
    - "go to github.com"
    - "navigate to openrouter.ai"
    - "visit google.com"
    - "open the page stackoverflow.com"
  de:
    - "gehe zu github.com"
    - "öffne seite google.de"
