# ---------------------------------------------------------------------------
# Router settings — how LiteLLM picks between deployments
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: "latency-based-routing"
  num_retries: 3
  retry_after: 0
  timeout: 60
  allowed_fails: 2
  cooldown_time: 30

# ---------------------------------------------------------------------------
# Fallback chains — if model_name X fails, try Y, then Z
# ---------------------------------------------------------------------------
litellm_settings:
  fallbacks:
    - vision: ["coding", "text", "fast"]
    - coding: ["text", "fast"]
    - text: ["fast"]
    - repair: ["coding", "text", "fast"]
    - planning: ["coding", "text", "fast"]
    - polish: ["text", "fast"]
  set_verbose: false
  drop_params: true
  # Cache settings (optional — uncomment for Redis/in-memory caching)
  # cache: true
  # cache_params:
  #   type: "local"
  #   ttl: 3600

# ---------------------------------------------------------------------------
# Semantic auto-routing — classify prompt to specialist model
# ---------------------------------------------------------------------------
routes:
  - route_name: "vision-tasks"
    utterances:
      - "describe this image"
      - "what's in the picture"
      - "analyze chart"
      - "analyze screenshot"
      - "find UI element"
      - "read text from image"
      - "solve captcha"
      - "what do you see"
      - "opisz zrzut ekranu"
      - "co jest na obrazku"
    model: "vision"
    threshold: 0.75

  - route_name: "coding-tasks"
    utterances:
      - "write code"
      - "generate SQL query"
      - "docker command"
      - "kubectl command"
      - "shell command"
      - "fix this code"
      - "debug script"
      - "napisz kod"
      - "komenda shell"
      - "zapytanie SQL"
    model: "coding"
    threshold: 0.75

  - route_name: "polish-tasks"
    utterances:
      - "przetłumacz na polski"
      - "odpowiedz po polsku"
      - "wyjaśnij po polsku"
      - "pokaż procesy"
      - "znajdź pliki"
      - "wyświetl katalogi"
    model: "polish"
    threshold: 0.80

  - route_name: "planning-tasks"
    utterances:
      - "plan a sequence of actions"
      - "decompose this task"
      - "create a multi-step plan"
      - "zaplanuj kroki"
      - "rozłóż na etapy"
    model: "planning"
    threshold: 0.80

  - route_name: "repair-tasks"
    utterances:
      - "fix this command"
      - "repair the output"
      - "command failed"
      - "napraw komendę"
    model: "repair"
    threshold: 0.80

  - route_name: "text-general"
    utterances:
      - "explain this"
      - "summarize"
      - "answer my question"
    model: "text"
    threshold: 0.60
