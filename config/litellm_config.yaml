# =============================================================================
# NLP2CMD — LiteLLM Router Configuration
# =============================================================================
# Multi-model routing with fallbacks, specialization, and priority.
#
# Strategy: paid remote → free remote → local Ollama
# Specialization: vision, coding, text, polish, repair, validation, fast
#
# Usage:
#   from nlp2cmd.llm.router import LLMRouter
#   router = LLMRouter()  # auto-loads this config
#   resp = await router.completion("Describe this image", task="vision")
#
# Or standalone LiteLLM proxy:
#   litellm --config config/litellm_config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Model deployments — each model_name can have multiple deployments (fallbacks)
# ---------------------------------------------------------------------------
model_list:

  # ===================== VISION MODELS =====================
  - model_name: vision
    litellm_params:
      model: openrouter/google/gemini-2.5-pro-preview
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
      max_tokens: 4096
      rpm: 10
      tpm: 100000
    model_info:
      description: "Best vision model — Google Gemini 2.5 Pro (paid, remote)"
      supports_vision: true
      priority: 1

  - model_name: vision
    litellm_params:
      model: openrouter/qwen/qwen-2.5-vl-7b-instruct:free
